<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cashflow Calculator{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            color: #1a1a1a;
            background: #f5f5f5;
        }

        nav {
            background: #1e3a5f;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 52px;
        }
        nav .brand { color: #fff; font-weight: 600; font-size: 1rem; text-decoration: none; }
        nav a { color: #b8cfe8; text-decoration: none; font-size: 0.9rem; }
        nav a:hover { color: #fff; }

        .container { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.25rem; color: #1e3a5f; }
        h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 1rem; color: #1e3a5f; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #f0f4f8; text-align: left; padding: 0.6rem 0.9rem; font-weight: 600; border-bottom: 2px solid #d0d8e4; }
        td { padding: 0.6rem 0.9rem; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-success { background: #dcf5e8; color: #1a6b3a; }
        .badge-failed  { background: #fde8e8; color: #8b1a1a; }
        .badge-pending { background: #fef3dc; color: #7a4f00; }

        .btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .btn-primary { background: #1e3a5f; color: #fff; }
        .btn-primary:hover { background: #16304f; }
        .btn-secondary { background: #eef2f7; color: #1e3a5f; border: 1px solid #c8d4e4; }
        .btn-secondary:hover { background: #dde6f0; }
        .btn-success { background: #1a6b3a; color: #fff; }
        .btn-success:hover { background: #155830; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-weight: 500; margin-bottom: 0.35rem; font-size: 0.9rem; }
        .help-text { font-size: 0.82rem; color: #666; margin-top: 0.25rem; }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            background: #fafafa;
        }

        .alert {
            padding: 1rem 1.25rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .alert-error { background: #fde8e8; border: 1px solid #f5b8b8; color: #7a1a1a; }
        .alert-warning { background: #fff8e6; border: 1px solid #f5dfa0; color: #7a5000; }

        .error-list { margin: 0.5rem 0 0 1rem; }
        .error-list li { margin-bottom: 0.2rem; }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .summary-item { background: #f0f4f8; border-radius: 6px; padding: 1rem; text-align: center; }
        .summary-item .value { font-size: 1.8rem; font-weight: 700; color: #1e3a5f; }
        .summary-item .label { font-size: 0.8rem; color: #555; margin-top: 0.2rem; }

        .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.25rem; }

        .error-detail {
            background: #fdf0f0;
            border: 1px solid #f0c0c0;
            border-radius: 6px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            color: #6b1a1a;
            margin-top: 1rem;
        }

        .pagination { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: center; }
        .pagination a, .pagination span {
            padding: 0.35rem 0.7rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.85rem;
            text-decoration: none;
            color: #1e3a5f;
        }
        .pagination .current { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }
        .pagination a:hover { background: #eef2f7; }

        .column-guide { font-size: 0.82rem; }
        .column-guide code {
            background: #f0f4f8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<nav>
    <a href="/" class="brand">Cashflow Calculator</a>
    <a href="/">Upload</a>
    <a href="{% url 'calculator:history' %}">History</a>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
